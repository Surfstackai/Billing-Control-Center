<template>
    <div class="slds-scrollable_x">
        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_fixed-layout" aria-label={tableLabel}>
            <thead>
                <tr class="slds-line-height_reset">
                    <th scope="col" style="width:3.5rem;"><span class="slds-truncate" title="Select">Select</span></th>
                    <th scope="col"><span class="slds-truncate" title="Service Appointment">Service Appointment</span></th>
                    <th scope="col"><span class="slds-truncate" title="SA Completed Date">SA Completed Date</span></th>
                    <th scope="col"><span class="slds-truncate" title="Work Order">Work Order</span></th>
                    <th scope="col"><span class="slds-truncate" title="Technician">Technician</span></th>
                </tr>
            </thead>
            <tbody>
                <template if:true={hasRows}>
                    <template for:each={displayedGroups} for:item="group">
                        <tr key={group.groupKey} class="slds-theme_shade">
                            <td colspan={groupColumnSpan}>
                                <div class="slds-grid slds-wrap slds-grid_vertical-align-center">
                                    <div class="slds-col slds-size_4-of-12 slds-truncate">
                                        <lightning-input
                                            type="checkbox"
                                            variant="label-hidden"
                                            label={group.selectLabel}
                                            data-opportunity-id={group.opportunityId}
                                            checked={group.isSelected}
                                            disabled={group.isNotSelectable}
                                            onchange={handleOpportunitySelection}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_4-of-12 slds-truncate">
                                        <span class="slds-text-title_caps slds-text-color_weak">Opportunity</span>
                                        <span class="slds-m-left_x-small">
                                            <template if:true={group.hasOpportunity}>
                                                <a
                                                    href={group.opportunityUrl}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    class="slds-text-link">
                                                    {group.opportunityName}
                                                </a>
                                            </template>
                                            <template if:false={group.hasOpportunity}>
                                                {group.opportunityName}
                                            </template>
                                        </span>
                                    </div>
                                    <div class="slds-col slds-size_2-of-12 slds-truncate">
                                        <span class="slds-text-title_caps slds-text-color_weak">Account</span>
                                        <span class="slds-m-left_x-small">
                                            <template if:true={group.hasAccount}>
                                                <a
                                                    href={group.accountUrl}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    class="slds-text-link">
                                                    {group.accountName}
                                                </a>
                                            </template>
                                            <template if:false={group.hasAccount}>
                                                {group.accountName}
                                            </template>
                                        </span>
                                    </div>
                                    <div class="slds-col slds-size_2-of-12 slds-text-align_right">
                                        <span class="slds-text-title_caps slds-text-color_weak">Opportunity Amount</span>
                                        <span class="slds-m-left_x-small">
                                            <lightning-formatted-number
                                                value={group.displayOpportunityAmount}
                                                format-style="currency"
                                                currency-code="USD"
                                                maximum-fraction-digits="2">
                                            </lightning-formatted-number>
                                        </span>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <template for:each={group.rows} for:item="row">
                            <tr key={row.key} class="slds-hint-parent">
                                <td></td>
                                <td data-label="Service Appointment">
                                    <a
                                        href={row.serviceAppointmentUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        class="slds-text-link">
                                        {row.serviceAppointmentNumber}
                                    </a>
                                </td>
                                <td data-label="SA Completed Date">
                                    <lightning-formatted-date-time
                                        value={row.completionDateTime}
                                        year="numeric"
                                        month="2-digit"
                                        day="2-digit"
                                        hour="2-digit"
                                        minute="2-digit">
                                    </lightning-formatted-date-time>
                                </td>
                                <td data-label="Work Order">
                                    <template if:true={row.hasWorkOrder}>
                                        <a
                                            href={row.workOrderUrl}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            class="slds-text-link">
                                            {row.workOrderNumber}
                                        </a>
                                    </template>
                                    <template if:false={row.hasWorkOrder}>
                                        {row.workOrderNumber}
                                    </template>
                                </td>
                                <td data-label="Technician">{row.technicianName}</td>
                            </tr>
                        </template>
                    </template>
                </template>

                <template if:false={hasRows}>
                    <tr>
                        <td colspan={groupColumnSpan} class="slds-text-align_center slds-text-color_weak slds-p-vertical_large">
                            {emptyMessage}
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</template>
