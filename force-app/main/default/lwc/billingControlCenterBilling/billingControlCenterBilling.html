<template>
    <div class="control-center-card">
        <div class="hero">
            <div class="hero__intro">
                <p class="hero__eyebrow">Billing Control Center</p>
                <h1 class="hero__title">Service Appointments Ready to Bill</h1>
                <p class="hero__subtitle">Monitor completed unbilled appointments and complete billing in grouped invoice batches.</p>
            </div>
            <lightning-button
                icon-name="utility:refresh"
                label="Refresh"
                variant="brand"
                title="Refresh billing control center"
                onclick={handleRefresh}
                disabled={isLoading}>
            </lightning-button>
        </div>

        <template if:true={errorMessage}>
            <div class="slds-p-horizontal_large slds-p-bottom_medium">
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <h2>{errorMessage}</h2>
                </div>
            </div>
        </template>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Refreshing data" size="small"></lightning-spinner>
        </template>

        <div class="billing-kpi-container">
            <section class="kpi-grid">
                <template for:each={kpiTiles} for:item="tile">
                    <article key={tile.key} class="kpi-tile">
                        <div class="kpi-tile__header">
                            <span class="kpi-tile__title">{tile.title}</span>
                            <lightning-icon icon-name={tile.icon} size="small" alternative-text={tile.title}></lightning-icon>
                        </div>
                        <div class="kpi-tile__metric">
                            <template if:true={tile.isCurrency}>
                                <lightning-formatted-number
                                    value={tile.value}
                                    format-style="currency"
                                    currency-code="USD"
                                    maximum-fraction-digits="2">
                                </lightning-formatted-number>
                            </template>
                            <template if:false={tile.isCurrency}>
                                <lightning-formatted-number value={tile.value}></lightning-formatted-number>
                            </template>
                        </div>
                        <div class="kpi-tile__count">{tile.countText}</div>
                        <p class="kpi-tile__hint">{tile.hint}</p>
                    </article>
                </template>
            </section>
        </div>

        <section class="table-shell billing-console-shell">
            <div class="billing-tab-panel">
                <div class="table-toolbar">
                    <div class="table-toolbar__copy">
                        <p class="table-toolbar__eyebrow">Billing</p>
                        <h2 class="table-toolbar__title">Service Appointments Ready to Bill</h2>
                    </div>
                    <div class="table-toolbar__actions">
                        <lightning-input
                            class="toolbar-search"
                            type="search"
                            label="Search"
                            variant="label-hidden"
                            placeholder="Search work order, account, opportunity, owner"
                            value={searchKey}
                            onchange={handleSearchChange}>
                        </lightning-input>
                        <lightning-button
                            label="Complete Billing"
                            variant="brand"
                            onclick={handleOpenCompleteBillingModal}
                            disabled={isCompleteBillingDisabled}>
                        </lightning-button>
                    </div>
                </div>

                <div class="table-meta">
                    <span><lightning-formatted-number value={billableCount}></lightning-formatted-number> Service Appointments</span>
                    <span><lightning-formatted-number value={selectedOpportunityCount}></lightning-formatted-number> Opportunities Selected</span>
                    <span>{searchSummary}</span>
                </div>

                <lightning-accordion class="bucket-accordion" allow-multiple-sections-open>
                    <template for:each={visibleAccordionSections} for:item="section">
                        <lightning-accordion-section
                            key={section.categoryKey}
                            name={section.categoryKey}
                            label={section.titleWithCount}>
                            <div class="bucket-section-body">
                                <template if:true={section.isEmpty}>
                                    <p class="bucket-empty">No service appointments contribute to this KPI.</p>
                                </template>
                                <template if:false={section.isEmpty}>
                                    <div class="bucket-table-host" data-bucket={section.categoryKey}>
                                        <lightning-datatable
                                            key-field="rowKey"
                                            data={section.filteredRows}
                                            columns={workOrderColumns}
                                            selected-rows={section.selectedRowKeys}
                                            sorted-by={section.sortedBy}
                                            sorted-direction={section.sortDirection}
                                            onsort={handleWorkOrderSort}
                                            onrowselection={handleRowSelection}>
                                        </lightning-datatable>
                                    </div>
                                </template>
                            </div>
                        </lightning-accordion-section>
                    </template>
                </lightning-accordion>
            </div>
        </section>
    </div>

    <template if:true={isCompleteBillingModalOpen}>
        <c-billing-control-center-complete-billing-modal
            service-appointments={completeBillingModalSelections}
            onclose={handleCompleteBillingClose}
            onsuccess={handleCompleteBillingSuccess}>
        </c-billing-control-center-complete-billing-modal>
    </template>
</template>
